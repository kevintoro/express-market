services:
  postgres:
    image: postgres:16-alpine
    container_name: express-market-postgres
    environment:
      POSTGRES_DB: express_market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: builder
    container_name: express-market-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_PREFIX=api/v1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=express_market
      - DB_SYNCHRONIZE=true
      - DB_LOGGING=true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev

volumes:
  pg_data:
