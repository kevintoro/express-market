services:
  postgres:
    image: postgres:16-alpine
    container_name: express-market-postgres-prod
    environment:
      POSTGRES_DB: express_market
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      target: production
    container_name: express-market-app-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_PREFIX=api/v1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=express_market
      - DB_SYNCHRONIZE=false
      - DB_LOGGING=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
